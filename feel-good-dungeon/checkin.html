<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sign In — Feel Good Dungeon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cyan:   #00c3ff;
      --black:  #0d0d0d;
      --card:   #181818;
      --border: #252525;
      --green:  #4caf50;
      --red:    #ff0066;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--black);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.85rem;
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-logo svg { display: block; }

    .header-text .gym-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    .header-text .gym-name em { color: var(--cyan); font-style: normal; }

    .header-text .gym-sub {
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 1.5px;
      margin-top: 1px;
    }

    /* ── Date strip ── */
    .date-strip {
      text-align: center;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 2px;
      color: #444;
      padding: 0.55rem 1rem;
      background: #0a0a0a;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    /* ── Views ── */
    .view {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem 2rem;
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
    }

    .view.hidden { display: none; }

    /* ── Sign-in view ── */
    .welcome-ico { font-size: 3.5rem; margin-bottom: 1.25rem; line-height: 1; }

    .welcome-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.4rem;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      line-height: 1.05;
      margin-bottom: 0.5rem;
    }

    .welcome-sub {
      font-size: 0.9rem;
      color: #777;
      text-align: center;
      margin-bottom: 2.25rem;
    }

    .name-input {
      width: 100%;
      background: #1c1c1c;
      border: 2px solid var(--border);
      color: #fff;
      padding: 1rem 1.25rem;
      font-family: 'Barlow', sans-serif;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.2s;
      text-align: center;
      margin-bottom: 1rem;
      border-radius: 0;
      -webkit-appearance: none;
    }

    .name-input:focus { border-color: var(--cyan); }
    .name-input::placeholder { color: #444; }

    .signin-btn {
      width: 100%;
      background: var(--cyan);
      color: #000;
      border: none;
      padding: 1rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .signin-btn:hover  { background: #22d4ff; }
    .signin-btn:active { transform: scale(0.98); }

    .err-msg {
      display: none;
      width: 100%;
      color: var(--red);
      font-size: 0.84rem;
      text-align: center;
      margin-top: 0.75rem;
      padding: 0.6rem;
      border: 1px solid rgba(255,0,102,0.25);
      background: rgba(255,0,102,0.05);
    }

    /* ── Success view ── */
    .tick-circle {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(76,175,80,0.1);
      border: 2px solid var(--green);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      margin-bottom: 1.5rem;
      animation: popIn 0.4s cubic-bezier(.175,.885,.32,1.275);
    }

    @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .success-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 3rem;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--green);
      line-height: 1;
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .success-name {
      font-size: 1.25rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 0.5rem;
    }

    .success-time {
      font-size: 0.88rem;
      color: #666;
      text-align: center;
      margin-bottom: 0.35rem;
    }

    .success-time strong { color: var(--cyan); font-weight: 600; }

    .success-note {
      margin: 1.5rem 0 2rem;
      padding: 0.85rem 1.25rem;
      background: rgba(0,195,255,0.05);
      border: 1px solid rgba(0,195,255,0.15);
      font-size: 0.84rem;
      color: #777;
      text-align: center;
      line-height: 1.55;
    }

    /* ── Already signed in view ── */
    .already-ico { font-size: 3rem; margin-bottom: 1rem; }

    .already-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      text-transform: uppercase;
      color: var(--cyan);
      text-align: center;
      margin-bottom: 0.5rem;
    }

    /* ── Ghost button ── */
    .btn-ghost {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #666;
      padding: 0.7rem 1.5rem;
      font-family: 'Barlow', sans-serif;
      font-size: 0.88rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
      display: inline-block;
    }

    .btn-ghost:hover { border-color: #444; color: #aaa; }

    /* ── Admin trigger (invisible dot) ── */
    .admin-trigger {
      text-align: center;
      padding: 0.9rem;
      background: transparent;
      border: none;
      color: #1a1a1a;
      font-size: 0.7rem;
      cursor: pointer;
      letter-spacing: 4px;
      transition: color 0.3s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .admin-trigger:hover { color: #444; }

    /* ── Admin login ── */
    .admin-login {
      display: none;
      background: #0a0a0a;
      border-top: 1px solid var(--border);
      padding: 1.5rem;
      flex-shrink: 0;
    }

    .admin-login.open { display: block; }

    .admin-login-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: #444;
      margin-bottom: 1rem;
      text-align: center;
    }

    .pass-row { display: flex; gap: 0.5rem; max-width: 340px; margin: 0 auto; }

    .pass-row input {
      flex: 1;
      background: #161616;
      border: 1px solid var(--border);
      color: #fff;
      padding: 0.75rem 1rem;
      font-family: 'Barlow', sans-serif;
      font-size: 0.9rem;
      outline: none;
    }

    .pass-row input:focus { border-color: var(--cyan); }

    .pass-row button {
      background: var(--cyan);
      color: #000;
      border: none;
      padding: 0.75rem 1.25rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .admin-err {
      display: none;
      text-align: center;
      color: var(--red);
      font-size: 0.8rem;
      margin-top: 0.65rem;
    }

    /* ── Admin dashboard ── */
    .admin-dash {
      display: none;
      flex-direction: column;
      padding: 1.5rem;
      background: #0a0a0a;
      border-top: 1px solid var(--border);
    }

    .admin-dash.open { display: flex; }

    .admin-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .admin-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .danger-btn {
      background: transparent;
      border: 1px solid #2a2a2a;
      color: #555;
      padding: 0.45rem 1rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .danger-btn:hover { border-color: var(--red); color: var(--red); }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .a-stat {
      background: #141414;
      border: 1px solid var(--border);
      padding: 0.9rem 0.75rem;
      text-align: center;
    }

    .a-stat-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      color: var(--cyan);
      line-height: 1;
    }

    .a-stat-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #444;
      margin-top: 0.25rem;
    }

    .action-row {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 0.55rem 1rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--border);
      background: #161616;
      color: #888;
      transition: all 0.2s;
    }

    .action-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .action-btn.red:hover { border-color: var(--red); color: var(--red); }

    .filter-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.1rem;
      flex-wrap: wrap;
    }

    .filter-input {
      flex: 1;
      min-width: 140px;
      background: #161616;
      border: 1px solid var(--border);
      color: #fff;
      padding: 0.6rem 0.85rem;
      font-family: 'Barlow', sans-serif;
      font-size: 0.85rem;
      outline: none;
    }

    .filter-input:focus { border-color: var(--cyan); }

    .att-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .att-table th {
      text-align: left;
      padding: 0.55rem 0.75rem;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #444;
      border-bottom: 1px solid var(--border);
    }

    .att-table td {
      padding: 0.75rem;
      border-bottom: 1px solid #111;
    }

    .att-table tr:hover td { background: #111; }

    .td-name { font-weight: 600; color: #e0e0e0; }
    .td-date { font-size: 0.8rem; color: #666; }
    .td-time {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--cyan);
      white-space: nowrap;
    }

    .no-records {
      text-align: center;
      padding: 2.5rem 1rem;
      color: #333;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="site-header">
  <div class="header-logo">
    <svg width="36" height="36" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect x="36" y="43" width="28" height="14" rx="7" fill="#00c3ff"/>
      <rect x="8"  y="30" width="18" height="40" rx="5" fill="#00c3ff"/>
      <rect x="74" y="30" width="18" height="40" rx="5" fill="#00c3ff"/>
      <rect x="22" y="38" width="15" height="24" rx="3" fill="#0099cc"/>
      <rect x="63" y="38" width="15" height="24" rx="3" fill="#0099cc"/>
    </svg>
  </div>
  <div class="header-text">
    <div class="gym-name">FEEL <em>GOOD</em> DUNGEON</div>
    <div class="gym-sub">Midrand · Halfway House</div>
  </div>
</div>

<!-- Date strip -->
<div class="date-strip" id="dateStrip"></div>

<!-- ── SIGN-IN VIEW ── -->
<div class="view" id="signInView">
  <div class="welcome-ico">🏋️</div>
  <div class="welcome-title">Welcome,<br>Dungeon Champ</div>
  <p class="welcome-sub">Type your name to sign in for today's session</p>

  <input
    type="text"
    id="nameInput"
    class="name-input"
    placeholder="Your full name"
    autocomplete="name"
    autocorrect="off"
    autocapitalize="words"
    maxlength="60"
  >

  <button class="signin-btn" onclick="doSignIn()">Sign In →</button>

  <div class="err-msg" id="signInErr"></div>
</div>

<!-- ── SUCCESS VIEW ── -->
<div class="view hidden" id="successView">
  <div class="tick-circle">✓</div>
  <div class="success-title">Signed In!</div>
  <div class="success-name" id="confirmedName"></div>
  <div class="success-time" id="confirmedTime"></div>
  <div class="success-note">You're all set — go crush your session! 💪</div>
  <button class="btn-ghost" onclick="goBackToSignIn()">Different person? Tap here</button>
</div>

<!-- ── ALREADY SIGNED IN VIEW ── -->
<div class="view hidden" id="alreadyView">
  <div class="already-ico">⚡</div>
  <div class="already-title">Already<br>Signed In!</div>
  <p style="color:#666;text-align:center;margin:0.5rem 0 2rem;font-size:0.9rem;line-height:1.55;" id="alreadyMsg"></p>
  <button class="btn-ghost" onclick="goBackToSignIn()">Sign in as someone else</button>
</div>

<!-- Admin trigger -->
<button class="admin-trigger" id="adminTrigger" onclick="toggleAdminLogin()" title="Admin">· · ·</button>

<!-- Admin login -->
<div class="admin-login" id="adminLoginPanel">
  <div class="admin-login-title">Admin Access</div>
  <div class="pass-row">
    <input type="password" id="adminPassInput" placeholder="Passcode" onkeydown="if(event.key==='Enter')verifyAdmin()">
    <button onclick="verifyAdmin()">Enter</button>
  </div>
  <div class="admin-err" id="adminErr">Incorrect passcode.</div>
</div>

<!-- Admin dashboard -->
<div class="admin-dash" id="adminDash">

  <div class="admin-top">
    <div class="admin-title">Attendance Log</div>
    <button class="danger-btn" onclick="lockAdmin()">🔒 Lock</button>
  </div>

  <div class="stats-row">
    <div class="a-stat">
      <div class="a-stat-num" id="statToday">0</div>
      <div class="a-stat-label">Today</div>
    </div>
    <div class="a-stat">
      <div class="a-stat-num" id="statWeek">0</div>
      <div class="a-stat-label">This Week</div>
    </div>
    <div class="a-stat">
      <div class="a-stat-num" id="statTotal">0</div>
      <div class="a-stat-label">All Time</div>
    </div>
  </div>

  <div class="action-row">
    <button class="action-btn" onclick="exportCSV()">⬇ Export CSV</button>
    <button class="action-btn red" onclick="clearAll()">✕ Clear All</button>
  </div>

  <div class="filter-row">
    <input type="text"  class="filter-input" id="filterName" placeholder="Search by name…" oninput="renderTable()">
    <input type="date"  class="filter-input" id="filterDate" oninput="renderTable()" style="max-width:165px;">
  </div>

  <table class="att-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Date</th>
        <th>Time In</th>
      </tr>
    </thead>
    <tbody id="attBody"></tbody>
  </table>

</div>

<script>
  const STORE_KEY  = 'fg_attendance';
  const ADMIN_PASS = 'FGD2025';

  // ── Date strip ──
  (function() {
    const now  = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const mnths= ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('dateStrip').textContent =
      days[now.getDay()] + ', ' + now.getDate() + ' ' + mnths[now.getMonth()] + ' ' + now.getFullYear();
  })();

  // ── Storage ──
  function getLog() {
    try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); }
    catch(e) { return []; }
  }

  function saveLog(log) {
    localStorage.setItem(STORE_KEY, JSON.stringify(log));
  }

  // ── Helpers ──
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function todayStr() {
    const n = new Date();
    const d = String(n.getDate()).padStart(2,'0');
    const m = String(n.getMonth()+1).padStart(2,'0');
    return d + '/' + m + '/' + n.getFullYear();
  }

  function timeNow() {
    const n = new Date();
    return String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  }

  // ── Views ──
  function showView(id) {
    ['signInView','successView','alreadyView'].forEach(v => {
      document.getElementById(v).classList.toggle('hidden', v !== id);
    });
  }

  function goBackToSignIn() {
    document.getElementById('nameInput').value = '';
    document.getElementById('signInErr').style.display = 'none';
    showView('signInView');
    setTimeout(() => document.getElementById('nameInput').focus(), 100);
  }

  // ── Sign In ──
  function doSignIn() {
    const name = document.getElementById('nameInput').value.trim();
    const errEl = document.getElementById('signInErr');
    errEl.style.display = 'none';

    if (name.length < 2) {
      errEl.textContent = 'Please enter your full name.';
      errEl.style.display = 'block';
      return;
    }

    const now  = Date.now();
    const date = todayStr();
    const time = timeNow();

    // Check duplicate within 4 hours
    const log    = getLog();
    const recent = log.find(r =>
      r.name.toLowerCase() === name.toLowerCase() &&
      (now - r.ts) < 4 * 3600 * 1000
    );

    if (recent) {
      document.getElementById('alreadyMsg').textContent =
        name + ' already signed in today at ' + recent.time + '. All good — go train!';
      showView('alreadyView');
      return;
    }

    // Save
    log.unshift({ name, date, time, ts: now });
    saveLog(log);

    // Show success
    document.getElementById('confirmedName').textContent = name;
    document.getElementById('confirmedTime').innerHTML =
      '<strong>' + date + '</strong> at <strong>' + time + '</strong>';
    showView('successView');
  }

  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSignIn();
  });

  // ── Admin ──
  function toggleAdminLogin() {
    document.getElementById('adminLoginPanel').classList.toggle('open');
    document.getElementById('adminErr').style.display = 'none';
  }

  function verifyAdmin() {
    const pass = document.getElementById('adminPassInput').value;
    if (pass === ADMIN_PASS) {
      document.getElementById('adminLoginPanel').classList.remove('open');
      document.getElementById('adminPassInput').value = '';
      document.getElementById('adminDash').classList.add('open');
      renderStats();
      renderTable();
    } else {
      const err = document.getElementById('adminErr');
      err.style.display = 'block';
      setTimeout(() => { err.style.display = 'none'; }, 2000);
    }
  }

  function lockAdmin() {
    document.getElementById('adminDash').classList.remove('open');
  }

  // ── Stats ──
  function renderStats() {
    const log   = getLog();
    const today = todayStr();
    const week  = Date.now() - 7 * 24 * 3600 * 1000;
    document.getElementById('statToday').textContent = log.filter(r => r.date === today).length;
    document.getElementById('statWeek').textContent  = log.filter(r => r.ts >= week).length;
    document.getElementById('statTotal').textContent = log.length;
  }

  // ── Table ──
  function renderTable() {
    const log        = getLog();
    const nameFilter = document.getElementById('filterName').value.toLowerCase();
    const dateInput  = document.getElementById('filterDate').value; // yyyy-mm-dd

    let dateFilter = '';
    if (dateInput) {
      const [y, m, d] = dateInput.split('-');
      dateFilter = d + '/' + m + '/' + y;
    }

    const rows = log.filter(r => {
      if (nameFilter && !r.name.toLowerCase().includes(nameFilter)) return false;
      if (dateFilter && r.date !== dateFilter) return false;
      return true;
    });

    const tbody = document.getElementById('attBody');
    if (!rows.length) {
      tbody.innerHTML = '<tr><td colspan="3" class="no-records">No records found.</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map(r => `
      <tr>
        <td class="td-name">${esc(r.name)}</td>
        <td class="td-date">${esc(r.date)}</td>
        <td class="td-time">${esc(r.time)}</td>
      </tr>
    `).join('');

    renderStats();
  }

  // ── Export CSV ──
  function exportCSV() {
    const log = getLog();
    if (!log.length) { alert('No records to export.'); return; }
    const header = ['Name', 'Date', 'Time In'];
    const csv    = [header, ...log.map(r => [r.name, r.date, r.time])]
      .map(row => row.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(','))
      .join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const now  = new Date();
    a.href     = url;
    a.download = 'fgd-attendance-' + todayStr().replace(/\//g, '-') + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ── Clear all ──
  function clearAll() {
    if (!confirm('Delete ALL attendance records? This cannot be undone.')) return;
    saveLog([]);
    renderTable();
  }
</script>
</body>
</html>
