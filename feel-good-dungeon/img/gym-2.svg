<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <radialGradient id="bg2" cx="45%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#1c1208"/>
      <stop offset="60%" stop-color="#0e0e0a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <!-- Kettlebell body — matte black with rim light -->
    <radialGradient id="kb2" cx="28%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="55%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <!-- KB handle — polished steel -->
    <linearGradient id="kbh2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="30%" stop-color="#ccc"/>
      <stop offset="55%" stop-color="#eee"/>
      <stop offset="80%" stop-color="#aaa"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <!-- Dumbbell plates — polished hex -->
    <radialGradient id="hex2" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="45%" stop-color="#333"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <linearGradient id="dbh2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ddd"/>
      <stop offset="30%" stop-color="#aaa"/>
      <stop offset="70%" stop-color="#888"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
    <radialGradient id="floor2" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#201508"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
  </defs>

  <rect width="600" height="800" fill="#050505"/>
  <rect width="600" height="800" fill="url(#bg2)"/>

  <!-- Warm floor -->
  <rect x="0" y="630" width="600" height="170" fill="url(#floor2)"/>
  <line x1="0" y1="630" x2="600" y2="630" stroke="#2a1a08" stroke-width="2"/>

  <!-- === 32KG KETTLEBELL (left, dominant) === -->

  <!-- Handle — polished steel arc -->
  <path d="M 148 275 Q 148 210 182 192 Q 226 174 270 192 Q 304 208 304 275"
        stroke="url(#kbh2)" stroke-width="32" fill="none" stroke-linecap="round"/>
  <!-- Handle inner reflection -->
  <path d="M 160 275 Q 160 222 190 206 Q 228 191 266 206 Q 292 220 292 275"
        stroke="rgba(255,255,255,0.15)" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Body sphere -->
  <circle cx="226" cy="450" r="128" fill="url(#kb2)"/>
  <!-- Rim light (right edge — silver glow) -->
  <circle cx="226" cy="450" r="128" fill="none" stroke="#555" stroke-width="1.5" opacity="0.5"/>
  <!-- Right side bright rim -->
  <path d="M 330 370 Q 358 410 354 450 Q 352 490 326 530" stroke="rgba(200,200,200,0.15)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- Body highlight top-left -->
  <ellipse cx="186" cy="398" rx="50" ry="40" fill="rgba(255,255,255,0.04)"/>
  <!-- Equator line -->
  <ellipse cx="226" cy="450" rx="128" ry="18" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>
  <!-- Bottom flat -->
  <ellipse cx="226" cy="570" rx="92" ry="14" fill="#080808"/>

  <!-- Weight text -->
  <text x="226" y="440" text-anchor="middle" font-family="Arial Black" font-weight="900" font-size="44" fill="#444">32</text>
  <text x="226" y="476" text-anchor="middle" font-family="Arial Black" font-weight="700" font-size="16" fill="#333" letter-spacing="4">KG</text>

  <!-- Shadow KB -->
  <ellipse cx="226" cy="574" rx="110" ry="16" fill="rgba(0,0,0,0.7)"/>

  <!-- === 20KG HEX DUMBBELL (right, foreground) === -->

  <!-- Left hex plate -->
  <polygon points="368,556 392,516 436,516 460,556 436,596 392,596" fill="url(#hex2)"/>
  <!-- Left plate highlight edge -->
  <polygon points="368,556 392,516 436,516 460,556 436,596 392,596" fill="none" stroke="#777" stroke-width="1.5"/>
  <!-- Left plate inner face -->
  <polygon points="376,556 397,523 431,523 452,556 431,589 397,589" fill="#1a1a1a"/>
  <!-- Chrome handle -->
  <rect x="458" y="526" width="78" height="22" rx="11" fill="url(#dbh2)"/>
  <!-- Handle reflection -->
  <rect x="458" y="527" width="78" height="7" rx="3" fill="rgba(255,255,255,0.2)"/>
  <!-- Knurling marks -->
  <line x1="472" y1="526" x2="472" y2="548" stroke="#888" stroke-width="1.5"/>
  <line x1="484" y1="526" x2="484" y2="548" stroke="#888" stroke-width="1.5"/>
  <line x1="496" y1="526" x2="496" y2="548" stroke="#888" stroke-width="1.5"/>
  <line x1="508" y1="526" x2="508" y2="548" stroke="#888" stroke-width="1.5"/>
  <line x1="520" y1="526" x2="520" y2="548" stroke="#888" stroke-width="1.5"/>
  <!-- Right hex plate -->
  <polygon points="534,556 558,516 602,516 626,556 602,596 558,596" fill="url(#hex2)"/>
  <polygon points="534,556 558,516 602,516 626,556 602,596 558,596" fill="none" stroke="#777" stroke-width="1.5"/>
  <polygon points="542,556 563,523 597,523 618,556 597,589 563,589" fill="#1a1a1a"/>
  <!-- Weight text on plate -->
  <text x="414" y="560" text-anchor="middle" font-family="Arial Black" font-weight="900" font-size="16" fill="#777">20</text>
  <text x="414" y="576" text-anchor="middle" font-family="Arial" font-size="9" fill="#555" letter-spacing="1">KG</text>

  <!-- Shadow dumbbell -->
  <ellipse cx="496" cy="635" rx="108" ry="13" fill="rgba(0,0,0,0.65)"/>

  <!-- Cyan accent -->
  <rect x="0" y="794" width="600" height="6" fill="#00c3ff" opacity="0.6"/>

  <!-- Vignette -->
  <radialGradient id="vig2" cx="40%" cy="55%" r="70%">
    <stop offset="30%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.7)"/>
  </radialGradient>
  <rect width="600" height="800" fill="url(#vig2)"/>
</svg>
