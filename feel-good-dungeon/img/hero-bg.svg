<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900">
  <defs>
    <radialGradient id="hbg" cx="72%" cy="35%" r="72%">
      <stop offset="0%" stop-color="#222"/>
      <stop offset="50%" stop-color="#0e0e0e"/>
      <stop offset="100%" stop-color="#040404"/>
    </radialGradient>
    <linearGradient id="hbar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="25%" stop-color="#aaa"/>
      <stop offset="60%" stop-color="#777"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <radialGradient id="hplate" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="55%" stop-color="#222"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </radialGradient>
    <linearGradient id="hrack" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="45%" stop-color="#4a4a4a"/>
      <stop offset="55%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#161616"/>
    </linearGradient>
    <radialGradient id="hkb" cx="28%" cy="22%" r="65%">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="55%" stop-color="#181818"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <linearGradient id="hkbh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="40%" stop-color="#ccc"/>
      <stop offset="60%" stop-color="#ddd"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <radialGradient id="hspot" cx="72%" cy="22%" r="48%">
      <stop offset="0%" stop-color="#282828"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="hfloor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#181208"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="900" fill="#040404"/>
  <rect width="1400" height="900" fill="url(#hbg)"/>
  <rect width="1400" height="900" fill="url(#hspot)"/>

  <!-- Floor -->
  <rect x="0" y="650" width="1400" height="250" fill="url(#hfloor)"/>
  <line x1="0" y1="650" x2="1400" y2="650" stroke="#201508" stroke-width="2"/>
  <!-- Floor perspective lines -->
  <line x1="1050" y1="650" x2="0" y2="900"    stroke="#14100a" stroke-width="1"/>
  <line x1="1050" y1="650" x2="500" y2="900"   stroke="#14100a" stroke-width="1"/>
  <line x1="1050" y1="650" x2="800" y2="900"   stroke="#14100a" stroke-width="1"/>
  <line x1="1050" y1="650" x2="1400" y2="900"  stroke="#14100a" stroke-width="1"/>
  <line x1="0" y1="740" x2="1400" y2="740" stroke="#111009" stroke-width="1"/>
  <line x1="0" y1="820" x2="1400" y2="820" stroke="#111009" stroke-width="1"/>

  <!-- === POWER RACK (right, prominent) === -->
  <!-- Back upright -->
  <rect x="1068" y="55" width="20" height="596" rx="4" fill="#151515" stroke="#222" stroke-width="1"/>
  <!-- Front upright -->
  <rect x="950"  y="55" width="20" height="596" rx="4" fill="url(#hrack)" stroke="#444" stroke-width="1.5"/>
  <!-- Upright shine -->
  <rect x="950" y="55" width="5" height="596" rx="2" fill="rgba(255,255,255,0.06)"/>
  <!-- Top cross beam -->
  <rect x="948" y="60" width="142" height="18" rx="4" fill="#333" stroke="#555" stroke-width="1"/>
  <!-- Cross members -->
  <rect x="948" y="230" width="142" height="10" rx="3" fill="#222" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="948" y="380" width="142" height="10" rx="3" fill="#222" stroke="#3a3a3a" stroke-width="1"/>
  <rect x="948" y="510" width="142" height="10" rx="3" fill="#222" stroke="#3a3a3a" stroke-width="1"/>
  <!-- J-hooks — bright -->
  <rect x="960" y="308" width="32" height="22" rx="5" fill="#777" stroke="#aaa" stroke-width="1.5"/>
  <rect x="1047" y="308" width="32" height="22" rx="5" fill="#777" stroke="#aaa" stroke-width="1.5"/>
  <!-- Barbell on rack -->
  <rect x="860" y="308" width="360" height="14" rx="7" fill="url(#hbar)"/>
  <rect x="860" y="309" width="360" height="5" rx="2" fill="rgba(255,255,255,0.18)"/>
  <!-- Plates -->
  <ellipse cx="898"  cy="315" rx="12" ry="80" fill="#101010"/>
  <ellipse cx="913"  cy="315" rx="12" ry="80" fill="#181818"/>
  <ellipse cx="928"  cy="315" rx="12" ry="80" fill="url(#hplate)"/>
  <ellipse cx="928"  cy="315" rx="12" ry="80" fill="none" stroke="#777" stroke-width="1.5"/>
  <ellipse cx="928"  cy="315" rx="6"  ry="42" fill="none" stroke="#555" stroke-width="2"/>
  <ellipse cx="1178" cy="315" rx="12" ry="80" fill="#101010"/>
  <ellipse cx="1163" cy="315" rx="12" ry="80" fill="#181818"/>
  <ellipse cx="1148" cy="315" rx="12" ry="80" fill="url(#hplate)"/>
  <ellipse cx="1148" cy="315" rx="12" ry="80" fill="none" stroke="#777" stroke-width="1.5"/>
  <ellipse cx="1148" cy="315" rx="6"  ry="42" fill="none" stroke="#555" stroke-width="2"/>
  <!-- Rack base -->
  <rect x="940" y="642" width="28" height="18" rx="4" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <rect x="1059" y="642" width="28" height="18" rx="4" fill="#1e1e1e" stroke="#333" stroke-width="1"/>

  <!-- === DUMBBELL RACK (left, middle ground) === -->
  <!-- Frame -->
  <rect x="50" y="430" width="320" height="60" rx="6" fill="#0e0e0e" stroke="#222" stroke-width="1"/>
  <rect x="50" y="495" width="320" height="50" rx="6" fill="#0c0c0c" stroke="#1e1e1e" stroke-width="1"/>
  <!-- Top row DBs — chrome hex -->
  <polygon points="80,437  96,413 128,413 144,437 128,461 96,461"  fill="#444" stroke="#888" stroke-width="1.5"/>
  <rect x="142" y="427" width="30" height="14" rx="7" fill="url(#hbar)"/>
  <polygon points="170,437 186,413 218,413 234,437 218,461 186,461" fill="#444" stroke="#888" stroke-width="1.5"/>

  <polygon points="210,437 228,413 264,413 282,437 264,461 228,461" fill="#4a4a4a" stroke="#999" stroke-width="1.5"/>
  <rect x="280" y="426" width="30" height="15" rx="7" fill="url(#hbar)"/>
  <polygon points="308,437 326,413 362,413 380,437 362,461 326,461" fill="#4a4a4a" stroke="#999" stroke-width="1.5"/>

  <!-- Bottom row DBs — larger -->
  <polygon points="72,500  92,472 132,472 152,500 132,528 92,528"  fill="#383838" stroke="#777" stroke-width="1.5"/>
  <rect x="150" y="488" width="30" height="16" rx="8" fill="url(#hbar)"/>
  <polygon points="178,500 198,472 238,472 258,500 238,528 198,528" fill="#383838" stroke="#777" stroke-width="1.5"/>

  <polygon points="240,500 262,472 306,472 328,500 306,528 262,528" fill="#3e3e3e" stroke="#888" stroke-width="1.5"/>
  <rect x="326" y="487" width="30" height="18" rx="9" fill="url(#hbar)"/>
  <polygon points="354,500 376,472 420,472 442,500 420,528 376,528" fill="#3e3e3e" stroke="#888" stroke-width="1.5"/>

  <!-- === KETTLEBELL ROW on floor === -->
  <!-- KB 1 (large) -->
  <path d="M 105 606 Q 105 580 120 572 Q 144 562 168 572 Q 182 580 182 606" stroke="url(#hkbh)" stroke-width="22" fill="none" stroke-linecap="round"/>
  <circle cx="143" cy="636" r="36" fill="url(#hkb)"/>
  <circle cx="143" cy="636" r="36" fill="none" stroke="#555" stroke-width="1.5"/>
  <path d="M 172 612 Q 181 624 179 636" stroke="rgba(200,200,200,0.1)" stroke-width="10" fill="none" stroke-linecap="round"/>
  <ellipse cx="143" cy="666" rx="28" ry="6" fill="#060606"/>
  <!-- KB 2 (medium) -->
  <path d="M 210 610 Q 210 587 222 580 Q 242 572 262 580 Q 274 587 274 610" stroke="url(#hkbh)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <circle cx="242" cy="636" r="30" fill="url(#hkb)"/>
  <circle cx="242" cy="636" r="30" fill="none" stroke="#444" stroke-width="1.5"/>
  <ellipse cx="242" cy="660" rx="22" ry="5" fill="#060606"/>
  <!-- KB 3 (small) -->
  <path d="M 300 614 Q 300 594 310 588 Q 326 582 342 588 Q 353 594 353 614" stroke="url(#hkbh)" stroke-width="15" fill="none" stroke-linecap="round"/>
  <circle cx="326" cy="636" r="25" fill="url(#hkb)"/>
  <circle cx="326" cy="636" r="25" fill="none" stroke="#3a3a3a" stroke-width="1.5"/>
  <ellipse cx="326" cy="655" rx="18" ry="4" fill="#060606"/>

  <!-- Floor shadows -->
  <ellipse cx="210" cy="656" rx="240" ry="18" fill="rgba(0,0,0,0.6)"/>
  <ellipse cx="1010" cy="655" rx="175" ry="18" fill="rgba(0,0,0,0.65)"/>

  <!-- Ceiling light (right zone) -->
  <rect x="975" y="0" width="50" height="20" rx="3" fill="#1e1e1e" stroke="#2a2a2a" stroke-width="1"/>
  <ellipse cx="1000" cy="25" rx="110" ry="32" fill="rgba(255,255,220,0.025)"/>
  <ellipse cx="1000" cy="15" rx="30" ry="12" fill="rgba(255,255,220,0.04)"/>

  <!-- Left zone darkness gradient (text overlay area) -->
  <linearGradient id="hleft" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="rgba(4,4,4,0.97)"/>
    <stop offset="42%" stop-color="rgba(4,4,4,0.65)"/>
    <stop offset="100%" stop-color="transparent"/>
  </linearGradient>
  <rect width="1400" height="900" fill="url(#hleft)"/>

  <!-- Cyan accent -->
  <rect x="0" y="893" width="1400" height="7" fill="#00c3ff" opacity="0.5"/>

  <!-- Vignette -->
  <radialGradient id="hvig" cx="68%" cy="35%" r="72%">
    <stop offset="25%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.72)"/>
  </radialGradient>
  <rect width="1400" height="900" fill="url(#hvig)"/>
</svg>
