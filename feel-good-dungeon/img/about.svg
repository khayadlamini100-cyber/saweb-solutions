<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <radialGradient id="abg" cx="58%" cy="38%" r="66%">
      <stop offset="0%" stop-color="#202020"/>
      <stop offset="55%" stop-color="#0e0e0e"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <!-- Chrome dumbbell -->
    <linearGradient id="adb" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ddd"/>
      <stop offset="30%" stop-color="#aaa"/>
      <stop offset="60%" stop-color="#888"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <radialGradient id="ahex" cx="28%" cy="22%" r="65%">
      <stop offset="0%" stop-color="#777"/>
      <stop offset="50%" stop-color="#333"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <linearGradient id="afig" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="35%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </linearGradient>
    <radialGradient id="afloor" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#1c1208"/>
      <stop offset="100%" stop-color="#070707"/>
    </radialGradient>
  </defs>

  <rect width="600" height="800" fill="#050505"/>
  <rect width="600" height="800" fill="url(#abg)"/>

  <!-- Floor -->
  <rect x="0" y="670" width="600" height="130" fill="url(#afloor)"/>
  <line x1="0" y1="670" x2="600" y2="670" stroke="#201508" stroke-width="2"/>

  <!-- Rim light from right side (studio lighting) -->
  <linearGradient id="arim" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="80%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(255,240,200,0.04)"/>
  </linearGradient>
  <rect width="600" height="800" fill="url(#arim)"/>

  <!-- === STANDING FIGURE — DUMBBELL CURL === -->

  <!-- Head -->
  <ellipse cx="308" cy="128" rx="37" ry="42" fill="#1e1e1e"/>
  <!-- Hair / top -->
  <ellipse cx="308" cy="108" rx="37" ry="22" fill="#161616"/>

  <!-- Neck -->
  <rect x="294" y="166" width="28" height="26" fill="#1c1c1c"/>

  <!-- Torso — broad shoulders, v-shape -->
  <path d="M 224 192 Q 218 230 226 350 Q 232 400 260 432 L 356 432 Q 384 400 390 350 Q 398 230 392 192 Q 370 176 308 175 Q 246 176 224 192 Z" fill="url(#afig)"/>
  <!-- Torso right rim light -->
  <path d="M 386 196 Q 398 280 386 370 Q 376 408 350 432" stroke="rgba(255,240,200,0.07)" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- T-shirt sleeve line left -->
  <path d="M 224 192 Q 198 215 188 250" stroke="#181818" stroke-width="2" fill="none"/>
  <path d="M 392 192 Q 418 215 428 250" stroke="#181818" stroke-width="2" fill="none"/>

  <!-- LEFT ARM — relaxed, holding dumbbell down -->
  <path d="M 228 205 Q 198 248 190 310 Q 186 355 194 390" stroke="#1c1c1c" stroke-width="36" fill="none" stroke-linecap="round"/>
  <!-- Left forearm down -->
  <path d="M 192 388 Q 190 430 192 468" stroke="#1a1a1a" stroke-width="28" fill="none" stroke-linecap="round"/>

  <!-- LEFT DUMBBELL (down at side) -->
  <!-- Hex plates -->
  <polygon points="168,466 186,438 220,438 238,466 220,494 186,494" fill="url(#ahex)"/>
  <polygon points="168,466 186,438 220,438 238,466 220,494 186,494" fill="none" stroke="#888" stroke-width="1.5"/>
  <polygon points="176,466 192,445 214,445 230,466 214,487 192,487" fill="#1c1c1c"/>
  <!-- Handle -->
  <rect x="236" y="456" width="38" height="20" rx="10" fill="url(#adb)"/>
  <rect x="236" y="457" width="38" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
  <!-- Right hex plate -->
  <polygon points="272,466 290,438 324,438 342,466 324,494 290,494" fill="url(#ahex)"/>
  <polygon points="272,466 290,438 324,438 342,466 324,494 290,494" fill="none" stroke="#888" stroke-width="1.5"/>
  <polygon points="280,466 296,445 318,445 334,466 318,487 296,487" fill="#1c1c1c"/>
  <!-- Weight text -->
  <text x="203" y="470" text-anchor="middle" font-family="Arial Black" font-size="12" font-weight="900" fill="#666">20</text>

  <!-- RIGHT ARM — raised curl, peak contraction -->
  <path d="M 388 205 Q 418 242 432 290 Q 440 325 430 355 Q 420 375 404 385" stroke="#1e1e1e" stroke-width="36" fill="none" stroke-linecap="round"/>
  <!-- Right forearm curled toward shoulder -->
  <path d="M 406 383 Q 385 348 362 318 Q 348 298 344 272" stroke="#1c1c1c" stroke-width="28" fill="none" stroke-linecap="round"/>

  <!-- RIGHT DUMBBELL (curled up, peak) — chrome, prominent -->
  <!-- Left plate -->
  <polygon points="310,256 330,222 370,222 390,256 370,290 330,290" fill="url(#ahex)"/>
  <polygon points="310,256 330,222 370,222 390,256 370,290 330,290" fill="none" stroke="#aaa" stroke-width="2"/>
  <polygon points="318,256 336,230 364,230 382,256 364,282 336,282" fill="#1c1c1c"/>
  <!-- Chrome handle -->
  <rect x="388" y="246" width="44" height="20" rx="10" fill="url(#adb)"/>
  <rect x="388" y="247" width="44" height="7" rx="3" fill="rgba(255,255,255,0.22)"/>
  <!-- Knurling -->
  <line x1="398" y1="246" x2="398" y2="266" stroke="#aaa" stroke-width="1.5"/>
  <line x1="408" y1="246" x2="408" y2="266" stroke="#aaa" stroke-width="1.5"/>
  <line x1="418" y1="246" x2="418" y2="266" stroke="#aaa" stroke-width="1.5"/>
  <!-- Right plate -->
  <polygon points="430,256 450,222 490,222 510,256 490,290 450,290" fill="url(#ahex)"/>
  <polygon points="430,256 450,222 490,222 510,256 490,290 450,290" fill="none" stroke="#aaa" stroke-width="2"/>
  <polygon points="438,256 456,230 484,230 502,256 484,282 456,282" fill="#1c1c1c"/>
  <!-- Weight text right DB -->
  <text x="350" y="260" text-anchor="middle" font-family="Arial Black" font-size="14" font-weight="900" fill="#888">20</text>

  <!-- Forearm vein/definition highlight (right arm at peak) -->
  <path d="M 370 318 Q 358 300 348 278" stroke="rgba(255,255,255,0.05)" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- LEGS -->
  <path d="M 262 430 Q 252 520 248 670" stroke="#181818" stroke-width="54" fill="none" stroke-linecap="round"/>
  <path d="M 354 430 Q 364 520 368 670" stroke="#161616" stroke-width="54" fill="none" stroke-linecap="round"/>

  <!-- Shoes -->
  <path d="M 220 662 Q 218 674 240 676 L 288 676 Q 302 674 302 662" fill="#141414" stroke="#222" stroke-width="1"/>
  <path d="M 326 662 Q 326 674 348 676 L 396 676 Q 410 674 410 662" fill="#141414" stroke="#222" stroke-width="1"/>

  <!-- Floor shadow -->
  <ellipse cx="308" cy="674" rx="118" ry="15" fill="rgba(0,0,0,0.7)"/>

  <!-- Cyan accent -->
  <rect x="0" y="794" width="600" height="6" fill="#00c3ff" opacity="0.65"/>

  <!-- Vignette -->
  <radialGradient id="avig" cx="50%" cy="45%" r="65%">
    <stop offset="32%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.72)"/>
  </radialGradient>
  <rect width="600" height="800" fill="url(#avig)"/>
</svg>
