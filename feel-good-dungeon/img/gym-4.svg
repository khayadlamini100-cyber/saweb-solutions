<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <radialGradient id="g4bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <linearGradient id="g4bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="25%" stop-color="#5a5a5a"/>
      <stop offset="50%" stop-color="#6e6e6e"/>
      <stop offset="75%" stop-color="#4e4e4e"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
    <radialGradient id="g4plate" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#404040"/>
      <stop offset="50%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </radialGradient>
  </defs>

  <rect width="600" height="800" fill="#050505"/>
  <rect width="600" height="800" fill="url(#g4bg)"/>

  <!-- === TYPOGRAPHIC POSTER with barbell === -->

  <!-- Wall texture lines -->
  <line x1="0" y1="200" x2="600" y2="200" stroke="#0e0e0e" stroke-width="1"/>
  <line x1="0" y1="400" x2="600" y2="400" stroke="#0e0e0e" stroke-width="1"/>

  <!-- Large background text (ghost) -->
  <text x="300" y="220" text-anchor="middle" font-family="Arial Black" font-weight="900" font-size="88" fill="#0e0e0e" letter-spacing="-1">STRONG</text>

  <!-- Barbell centered at mid height -->
  <!-- Bar -->
  <rect x="25" y="400" width="550" height="16" rx="8" fill="url(#g4bar)"/>
  <!-- Bar shine -->
  <rect x="25" y="402" width="550" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>

  <!-- LEFT plate stack (2 x 45lb) -->
  <ellipse cx="98" cy="408" rx="13" ry="80" fill="#141414" stroke="#1e1e1e" stroke-width="1"/>
  <ellipse cx="113" cy="408" rx="13" ry="80" fill="#181818" stroke="#222" stroke-width="1"/>
  <ellipse cx="128" cy="408" rx="13" ry="80" fill="url(#g4plate)" stroke="#2c2c2c" stroke-width="1.5"/>
  <ellipse cx="128" cy="408" rx="7" ry="42" fill="none" stroke="#282828" stroke-width="2"/>
  <ellipse cx="128" cy="408" rx="3" ry="16" fill="none" stroke="#222" stroke-width="1.5"/>
  <text x="128" y="412" text-anchor="middle" font-family="Arial Black" font-size="9" fill="#383838" transform="rotate(90,128,408)">45LB</text>

  <!-- RIGHT plate stack -->
  <ellipse cx="502" cy="408" rx="13" ry="80" fill="#141414" stroke="#1e1e1e" stroke-width="1"/>
  <ellipse cx="487" cy="408" rx="13" ry="80" fill="#181818" stroke="#222" stroke-width="1"/>
  <ellipse cx="472" cy="408" rx="13" ry="80" fill="url(#g4plate)" stroke="#2c2c2c" stroke-width="1.5"/>
  <ellipse cx="472" cy="408" rx="7" ry="42" fill="none" stroke="#282828" stroke-width="2"/>
  <ellipse cx="472" cy="408" rx="3" ry="16" fill="none" stroke="#222" stroke-width="1.5"/>
  <text x="472" y="412" text-anchor="middle" font-family="Arial Black" font-size="9" fill="#383838" transform="rotate(-90,472,408)">45LB</text>

  <!-- Extra 25lb plates -->
  <ellipse cx="143" cy="408" rx="9" ry="58" fill="#1c1c1c" stroke="#242424" stroke-width="1"/>
  <ellipse cx="457" cy="408" rx="9" ry="58" fill="#1c1c1c" stroke="#242424" stroke-width="1"/>

  <!-- Collars -->
  <rect x="153" y="394" width="22" height="28" rx="4" fill="#333" stroke="#444" stroke-width="1"/>
  <rect x="425" y="394" width="22" height="28" rx="4" fill="#333" stroke="#444" stroke-width="1"/>

  <!-- Center knurling -->
  <rect x="195" y="400" width="210" height="16" fill="rgba(0,0,0,0.12)"/>
  <line x1="208" y1="400" x2="208" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="219" y1="400" x2="219" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="230" y1="400" x2="230" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="241" y1="400" x2="241" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="252" y1="400" x2="252" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="263" y1="400" x2="263" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="274" y1="400" x2="274" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="285" y1="400" x2="285" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="296" y1="400" x2="296" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="307" y1="400" x2="307" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="318" y1="400" x2="318" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="329" y1="400" x2="329" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="340" y1="400" x2="340" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="351" y1="400" x2="351" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="362" y1="400" x2="362" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="373" y1="400" x2="373" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="384" y1="400" x2="384" y2="416" stroke="#414141" stroke-width="1"/>
  <line x1="395" y1="400" x2="395" y2="416" stroke="#414141" stroke-width="1"/>

  <!-- Floor -->
  <rect x="0" y="560" width="600" height="240" fill="#0a0a0a"/>
  <line x1="0" y1="560" x2="600" y2="560" stroke="#161616" stroke-width="2"/>
  <ellipse cx="300" cy="564" rx="255" ry="16" fill="rgba(0,0,0,0.65)"/>

  <!-- === MOTIVATIONAL TEXT below bar === -->
  <text x="300" y="640" text-anchor="middle" font-family="Arial Black" font-weight="900" font-size="52" fill="#141414" letter-spacing="3">STRENGTH</text>
  <rect x="220" y="652" width="160" height="2" fill="#1e1e1e"/>
  <rect x="270" y="648" width="60" height="10" fill="#00c3ff" opacity="0.35"/>
  <text x="300" y="688" text-anchor="middle" font-family="Arial" font-weight="300" font-size="16" fill="#1a1a1a" letter-spacing="10">IS EARNED</text>

  <!-- Chalk on floor -->
  <ellipse cx="130" cy="568" rx="30" ry="9" fill="#111" opacity="0.9"/>
  <ellipse cx="460" cy="570" rx="24" ry="7" fill="#111" opacity="0.9"/>

  <!-- Cyan accent -->
  <rect x="0" y="793" width="600" height="7" fill="#00c3ff" opacity="0.55"/>

  <!-- Vignette -->
  <radialGradient id="g4vig" cx="50%" cy="50%" r="70%">
    <stop offset="30%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.72)"/>
  </radialGradient>
  <rect width="600" height="800" fill="url(#g4vig)"/>
</svg>
