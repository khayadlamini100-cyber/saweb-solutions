<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <radialGradient id="bg4" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#060606"/>
    </radialGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="25%" stop-color="#aaaaaa"/>
      <stop offset="60%" stop-color="#888"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <radialGradient id="plate4" cx="30%" cy="22%" r="65%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="55%" stop-color="#222"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </radialGradient>
    <linearGradient id="floor4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#181208"/>
      <stop offset="100%" stop-color="#090908"/>
    </linearGradient>
  </defs>

  <rect width="600" height="800" fill="#060606"/>
  <rect width="600" height="800" fill="url(#bg4)"/>

  <!-- Floor -->
  <rect x="0" y="560" width="600" height="240" fill="url(#floor4)"/>
  <line x1="0" y1="560" x2="600" y2="560" stroke="#1e1608" stroke-width="2"/>

  <!-- Wall texture -->
  <line x1="0" y1="180" x2="600" y2="180" stroke="#0f0f0f" stroke-width="1"/>

  <!-- === TYPOGRAPHY (main focus) === -->
  <text x="300" y="160" text-anchor="middle" font-family="Arial Black" font-weight="900" font-size="78" fill="#181818" letter-spacing="2">STRENGTH</text>

  <!-- Horizontal cyan rule -->
  <rect x="160" y="180" width="280" height="3" fill="#00c3ff" opacity="0.7"/>
  <rect x="260" y="175" width="80" height="13" fill="#00c3ff" opacity="0.4"/>

  <text x="300" y="250" text-anchor="middle" font-family="Arial" font-weight="300" font-size="22" fill="#333" letter-spacing="14">IS EARNED</text>

  <!-- === LOADED BARBELL (center) === -->
  <!-- Bar -->
  <rect x="20" y="390" width="560" height="17" rx="8" fill="url(#bar4)"/>
  <!-- Bar top shine -->
  <rect x="20" y="392" width="560" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>

  <!-- LEFT plates -->
  <ellipse cx="92"  cy="398" rx="13" ry="76" fill="#0e0e0e"/>
  <ellipse cx="108" cy="398" rx="13" ry="76" fill="#141414"/>
  <ellipse cx="124" cy="398" rx="13" ry="76" fill="url(#plate4)"/>
  <ellipse cx="124" cy="398" rx="13" ry="76" fill="none" stroke="#777" stroke-width="1.5"/>
  <ellipse cx="124" cy="398" rx="7"  ry="42" fill="none" stroke="#555" stroke-width="2"/>
  <ellipse cx="124" cy="398" rx="3"  ry="16" fill="none" stroke="#666" stroke-width="1.5"/>
  <text x="124" y="402" text-anchor="middle" font-family="Arial Black" font-size="8" fill="#888" transform="rotate(90,124,398)">45LB</text>

  <!-- RIGHT plates -->
  <ellipse cx="508" cy="398" rx="13" ry="76" fill="#0e0e0e"/>
  <ellipse cx="492" cy="398" rx="13" ry="76" fill="#141414"/>
  <ellipse cx="476" cy="398" rx="13" ry="76" fill="url(#plate4)"/>
  <ellipse cx="476" cy="398" rx="13" ry="76" fill="none" stroke="#777" stroke-width="1.5"/>
  <ellipse cx="476" cy="398" rx="7"  ry="42" fill="none" stroke="#555" stroke-width="2"/>
  <ellipse cx="476" cy="398" rx="3"  ry="16" fill="none" stroke="#666" stroke-width="1.5"/>
  <text x="476" y="402" text-anchor="middle" font-family="Arial Black" font-size="8" fill="#888" transform="rotate(-90,476,398)">45LB</text>

  <!-- Extra 25lb plates -->
  <ellipse cx="140" cy="398" rx="8" ry="55" fill="#1e1e1e" stroke="#666" stroke-width="1"/>
  <ellipse cx="460" cy="398" rx="8" ry="55" fill="#1e1e1e" stroke="#666" stroke-width="1"/>

  <!-- Collars — bright silver -->
  <rect x="150" y="383" width="24" height="30" rx="5" fill="#aaa" stroke="#ddd" stroke-width="1.5"/>
  <rect x="426" y="383" width="24" height="30" rx="5" fill="#aaa" stroke="#ddd" stroke-width="1.5"/>

  <!-- Knurling -->
  <line x1="196" y1="390" x2="196" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="208" y1="390" x2="208" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="220" y1="390" x2="220" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="232" y1="390" x2="232" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="244" y1="390" x2="244" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="256" y1="390" x2="256" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="268" y1="390" x2="268" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="280" y1="390" x2="280" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="292" y1="390" x2="292" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="304" y1="390" x2="304" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="316" y1="390" x2="316" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="328" y1="390" x2="328" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="340" y1="390" x2="340" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="352" y1="390" x2="352" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="364" y1="390" x2="364" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="376" y1="390" x2="376" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="388" y1="390" x2="388" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="400" y1="390" x2="400" y2="407" stroke="#bbb" stroke-width="1.2"/>
  <line x1="412" y1="390" x2="412" y2="407" stroke="#bbb" stroke-width="1.2"/>

  <!-- Floor shadow -->
  <ellipse cx="300" cy="564" rx="265" ry="17" fill="rgba(0,0,0,0.7)"/>

  <!-- Wrist wraps (floor detail) -->
  <ellipse cx="480" cy="592" rx="40" ry="22" fill="none" stroke="#252520" stroke-width="14"/>
  <ellipse cx="480" cy="592" rx="20" ry="10" fill="none" stroke="#1e1e1a" stroke-width="5"/>
  <!-- Chalk -->
  <ellipse cx="118" cy="594" rx="34" ry="9" fill="#171717" opacity="0.9"/>

  <!-- Cyan accent -->
  <rect x="0" y="794" width="600" height="6" fill="#00c3ff" opacity="0.7"/>

  <!-- Vignette -->
  <radialGradient id="vig4" cx="50%" cy="50%" r="70%">
    <stop offset="30%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.68)"/>
  </radialGradient>
  <rect width="600" height="800" fill="url(#vig4)"/>
</svg>
