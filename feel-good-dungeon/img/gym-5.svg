<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <radialGradient id="spot5" cx="50%" cy="0%" r="85%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="30%" stop-color="#141414"/>
      <stop offset="70%" stop-color="#070707"/>
      <stop offset="100%" stop-color="#020202"/>
    </radialGradient>
    <linearGradient id="bar5" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="30%" stop-color="#aaa"/>
      <stop offset="70%" stop-color="#777"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <radialGradient id="plate5" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="50%" stop-color="#222"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </radialGradient>
    <linearGradient id="fig5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="40%" stop-color="#222"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </linearGradient>
    <radialGradient id="floor5" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#1c1208"/>
      <stop offset="100%" stop-color="#070707"/>
    </radialGradient>
  </defs>

  <rect width="600" height="800" fill="#020202"/>
  <rect width="600" height="800" fill="url(#spot5)"/>

  <!-- Arched ceiling -->
  <path d="M -20 0 L -20 580 Q -20 720 300 760 Q 620 720 620 580 L 620 0 Z" fill="#070707"/>
  <path d="M 0 575 Q 0 700 300 738 Q 600 700 600 575" fill="none" stroke="#181818" stroke-width="2"/>
  <path d="M 30 568 Q 30 688 300 724 Q 570 688 570 568" fill="none" stroke="#111" stroke-width="1"/>

  <!-- Spotlight beam -->
  <path d="M 262 0 L 148 640 L 452 640 L 338 0 Z" fill="rgba(255,255,220,0.012)"/>
  <path d="M 274 0 L 192 520 L 408 520 L 326 0 Z" fill="rgba(255,255,220,0.012)"/>

  <!-- Ceiling light fixture -->
  <rect x="272" y="0" width="56" height="20" rx="4" fill="#222" stroke="#333" stroke-width="1"/>
  <ellipse cx="300" cy="12" rx="28" ry="10" fill="rgba(255,255,220,0.06)"/>
  <ellipse cx="300" cy="12" rx="14" ry="6" fill="rgba(255,255,220,0.09)"/>

  <!-- Floor -->
  <rect x="0" y="640" width="600" height="160" fill="url(#floor5)"/>
  <line x1="0" y1="640" x2="600" y2="640" stroke="#201508" stroke-width="2"/>

  <!-- === OVERHEAD BARBELL === -->
  <!-- Bar -->
  <rect x="52" y="130" width="496" height="14" rx="7" fill="url(#bar5)"/>
  <rect x="52" y="131" width="496" height="5" rx="2" fill="rgba(255,255,255,0.2)"/>

  <!-- Left plates -->
  <ellipse cx="98"  cy="137" rx="11" ry="64" fill="#0e0e0e"/>
  <ellipse cx="112" cy="137" rx="11" ry="64" fill="#161616"/>
  <ellipse cx="126" cy="137" rx="11" ry="64" fill="url(#plate5)"/>
  <ellipse cx="126" cy="137" rx="11" ry="64" fill="none" stroke="#777" stroke-width="1.5"/>
  <ellipse cx="126" cy="137" rx="5"  ry="34" fill="none" stroke="#555" stroke-width="2"/>
  <text x="126" y="141" text-anchor="middle" font-family="Arial Black" font-size="8" fill="#888" transform="rotate(90,126,137)">20KG</text>

  <!-- Right plates -->
  <ellipse cx="502" cy="137" rx="11" ry="64" fill="#0e0e0e"/>
  <ellipse cx="488" cy="137" rx="11" ry="64" fill="#161616"/>
  <ellipse cx="474" cy="137" rx="11" ry="64" fill="url(#plate5)"/>
  <ellipse cx="474" cy="137" rx="11" ry="64" fill="none" stroke="#777" stroke-width="1.5"/>
  <ellipse cx="474" cy="137" rx="5"  ry="34" fill="none" stroke="#555" stroke-width="2"/>
  <text x="474" y="141" text-anchor="middle" font-family="Arial Black" font-size="8" fill="#888" transform="rotate(-90,474,137)">20KG</text>

  <!-- Collars -->
  <rect x="138" y="123" width="18" height="28" rx="4" fill="#999" stroke="#ccc" stroke-width="1"/>
  <rect x="444" y="123" width="18" height="28" rx="4" fill="#999" stroke="#ccc" stroke-width="1"/>

  <!-- === TRAINING FIGURE silhouette — overhead press === -->
  <!-- Head -->
  <circle cx="300" cy="218" r="34" fill="#181818"/>
  <!-- Neck -->
  <rect x="286" y="248" width="28" height="24" fill="#161616"/>

  <!-- Torso -->
  <path d="M 218 268 Q 212 320 220 415 Q 228 460 265 490 L 335 490 Q 372 460 380 415 Q 390 320 382 268 Q 360 250 300 248 Q 240 250 218 268 Z" fill="url(#fig5)"/>
  <!-- Right side rim light (from spotlight) -->
  <path d="M 378 272 Q 390 340 378 430 Q 368 466 338 490" stroke="rgba(255,255,220,0.06)" stroke-width="16" fill="none" stroke-linecap="round"/>

  <!-- Left arm — raised, extended to bar -->
  <path d="M 222 278 Q 186 240 158 194 Q 146 166 148 140" stroke="#1a1a1a" stroke-width="30" fill="none" stroke-linecap="round"/>
  <!-- Right arm — raised, extended to bar -->
  <path d="M 378 278 Q 414 238 442 192 Q 456 165 452 140" stroke="#1a1a1a" stroke-width="30" fill="none" stroke-linecap="round"/>

  <!-- Legs -->
  <path d="M 266 488 Q 255 560 252 640" stroke="#161616" stroke-width="52" fill="none" stroke-linecap="round"/>
  <path d="M 334 488 Q 346 560 348 640" stroke="#141414" stroke-width="52" fill="none" stroke-linecap="round"/>

  <!-- Shoes -->
  <path d="M 224 633 Q 224 644 244 646 L 290 646 Q 302 644 302 634" fill="#141414" stroke="#1e1e1e" stroke-width="1"/>
  <path d="M 318 634 Q 318 644 338 646 L 384 646 Q 396 644 396 633" fill="#141414" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Floor spotlight pool -->
  <ellipse cx="300" cy="646" rx="195" ry="24" fill="rgba(255,255,200,0.018)"/>
  <ellipse cx="300" cy="648" rx="120" ry="14" fill="rgba(0,0,0,0.65)"/>

  <!-- Side rack uprights (atmosphere) -->
  <rect x="525" y="80" width="12" height="560" rx="4" fill="#111" stroke="#181818" stroke-width="1"/>
  <rect x="548" y="80" width="12" height="560" rx="4" fill="#0e0e0e" stroke="#141414" stroke-width="1"/>
  <rect x="525" y="220" width="35" height="8" rx="2" fill="#151515"/>
  <rect x="525" y="340" width="35" height="8" rx="2" fill="#151515"/>
  <rect x="525" y="460" width="35" height="8" rx="2" fill="#151515"/>

  <!-- Cyan accent -->
  <rect x="0" y="794" width="600" height="6" fill="#00c3ff" opacity="0.65"/>

  <!-- Vignette -->
  <radialGradient id="vig5" cx="50%" cy="50%" r="72%">
    <stop offset="28%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.82)"/>
  </radialGradient>
  <rect width="600" height="800" fill="url(#vig5)"/>
</svg>
