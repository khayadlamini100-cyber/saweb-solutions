<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Startup — SaSpark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="nav"></div>

  <section class="detail-hero">
    <div class="container" id="detail-mount">
      <!-- filled by JS -->
    </div>
  </section>

  <section style="padding-top: 40px;">
    <div class="container">
      <div class="detail-layout">
        <div class="detail-main" id="detail-main"></div>
        <aside class="fund-sidebar" id="fund-sidebar"></aside>
      </div>
    </div>
  </section>

  <!-- ─── FUND MODAL ─────────────────────────────────────────── -->
  <div class="modal-backdrop" id="fund-modal">
    <div class="modal">
      <button class="modal-close" id="fund-close">×</button>
      <div id="fund-step-amount">
        <h2 style="margin-bottom: 6px;">Back this startup</h2>
        <p class="muted" style="margin-bottom: 20px;">Minimum R1. Every cent counts.</p>
        <div class="amount-input-wrap">
          <span class="currency">R</span>
          <input type="number" id="fund-amount" class="amount-input" min="1" step="1" value="100" />
        </div>
        <div class="quick-amounts" id="quick-amounts">
          <button class="quick-amount" data-amt="1">R1</button>
          <button class="quick-amount" data-amt="50">R50</button>
          <button class="quick-amount" data-amt="100">R100</button>
          <button class="quick-amount" data-amt="250">R250</button>
          <button class="quick-amount" data-amt="500">R500</button>
          <button class="quick-amount" data-amt="1000">R1k</button>
          <button class="quick-amount" data-amt="2500">R2.5k</button>
          <button class="quick-amount" data-amt="5000">R5k</button>
        </div>
        <div class="form-group">
          <label class="form-label">Your name (optional)</label>
          <input type="text" id="fund-name" class="form-control" placeholder="Leave blank to fund anonymously" />
        </div>
        <div class="form-group">
          <label class="form-label">Message to the founder (optional)</label>
          <textarea id="fund-msg" class="form-control" rows="3" maxlength="200" placeholder="Say why you're backing them…"></textarea>
        </div>
        <button class="btn btn-fund btn-full btn-lg" id="fund-continue">Continue to payment →</button>
        <p style="font-size: 0.78rem; color: var(--slate-500); text-align: center; margin-top: 14px;">
          🔒 Held in a regulated trust account. Released to founder when milestones are verified.
        </p>
      </div>

      <div id="fund-step-pay" style="display: none;">
        <h2 style="margin-bottom: 6px;">Choose how to pay</h2>
        <p class="muted" style="margin-bottom: 20px;">Funding <strong id="fund-confirm-amt" style="color: var(--ink);">R0</strong> to <strong id="fund-confirm-name" style="color: var(--ink);"></strong></p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
          <button class="pay-method" data-pay="card">💳<br><strong>Card</strong><br><small>Visa / Mastercard</small></button>
          <button class="pay-method" data-pay="eft">🏦<br><strong>Instant EFT</strong><br><small>FNB, Capitec, Absa…</small></button>
          <button class="pay-method" data-pay="snap">📱<br><strong>SnapScan</strong><br><small>QR code</small></button>
          <button class="pay-method" data-pay="zapper">⚡<br><strong>Zapper</strong><br><small>QR code</small></button>
        </div>
        <button class="btn btn-ghost btn-full btn-sm" id="fund-back">← Choose another amount</button>
      </div>

      <div id="fund-step-success" style="display: none; text-align: center;">
        <div style="font-size: 4rem; margin-bottom: 10px;">🎉</div>
        <h2 style="margin-bottom: 8px;">Thank you!</h2>
        <p class="muted" style="margin-bottom: 24px;">Your contribution of <strong id="success-amt" style="color: var(--lime-deep);"></strong> has been received. The founder will be notified.</p>
        <button class="btn btn-primary btn-full" id="fund-done">Done</button>
      </div>
    </div>
  </div>

  <style>
    .pay-method {
      padding: 18px 12px;
      background: var(--slate-50);
      border: 2px solid var(--slate-200);
      border-radius: 12px;
      font-size: 0.85rem;
      cursor: pointer;
      line-height: 1.6;
      transition: border-color 0.15s, background 0.15s;
    }
    .pay-method:hover { border-color: var(--violet); background: var(--white); }
    .pay-method strong { font-size: 0.95rem; }
    .pay-method small { color: var(--slate-500); }

    .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-top: 14px; }
    .team-card { display: flex; gap: 12px; padding: 14px; background: var(--slate-50); border-radius: 12px; align-items: center; }
    .team-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--grad-brand); color: white; display: grid; place-items: center; font-weight: 800; flex-shrink: 0; font-size: 0.9rem; }
    .team-name { font-weight: 700; font-size: 0.92rem; }
    .team-role { color: var(--slate-500); font-size: 0.82rem; }
  </style>

  <div id="footer"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    app.renderNav('explore');
    app.renderFooter();

    const id = app.qs('id') || 's02';
    const s = app.getStartupById(id);

    if (!s) {
      document.getElementById('detail-mount').innerHTML = `
        <div class="empty">
          <div class="empty-icon">🤔</div>
          <h2>Startup not found</h2>
          <p style="margin-top: 8px;">It may have been removed, or the link is broken.</p>
          <a class="btn btn-primary mt-2" href="explore.html">Browse all startups</a>
        </div>`;
    } else {
      renderDetail(s);
      renderSidebar(s);
      bindFundModal(s);
    }

    function renderDetail(s) {
      const cat = app.catLookup(s.category);
      document.getElementById('detail-mount').innerHTML = `
        <a href="explore.html" style="color: var(--slate-500); font-size: 0.9rem; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 20px;">← Back to explore</a>
        <div class="detail-cover cat-${cat.color}">
          <span class="cat-tag">${cat.icon} ${cat.name}</span>
          ${s.verified ? '<span class="verified-badge" style="width:36px; height:36px; font-size:1.1rem;" title="Verified">✓</span>' : ''}
          <span style="font-size: 8rem;">${s.emoji || cat.icon}</span>
        </div>
        <h1 class="detail-title">${app.escapeHtml(s.name)}</h1>
        <p class="detail-tagline">${app.escapeHtml(s.tagline)}</p>
        <div class="detail-meta">
          <span>📍 ${app.escapeHtml(s.location)}</span>
          <span>👤 Founded by ${app.escapeHtml(s.founder)}</span>
          <span>📅 Listed ${new Date(s.createdAt).toLocaleDateString('en-ZA', { day:'numeric', month:'short', year:'numeric' })}</span>
          <span>👀 ${app.fmtNum(s.views)} views</span>
        </div>
      `;

      const docsHTML = (s.documents || []).map((d) => `<div class="trust-item"><span class="ti-check">✓</span>${app.escapeHtml(d)}</div>`).join('');

      const teamHTML = (s.team || []).map((t) => `
        <div class="team-card">
          <div class="team-avatar">${t.initials}</div>
          <div>
            <div class="team-name">${app.escapeHtml(t.name)}</div>
            <div class="team-role">${app.escapeHtml(t.role)}</div>
          </div>
        </div>
      `).join('');

      const updatesHTML = (s.updates || []).length
        ? s.updates.map((u) => `
            <div class="update">
              <div class="update-meta">
                <span class="pill">Update</span>
                <span>${new Date(u.date).toLocaleDateString('en-ZA', { day:'numeric', month:'short', year:'numeric' })}</span>
              </div>
              <h4>${app.escapeHtml(u.title)}</h4>
              <p>${app.escapeHtml(u.body)}</p>
            </div>
          `).join('')
        : '<p class="muted">No updates posted yet. The founder will share progress as they hit milestones.</p>';

      document.getElementById('detail-main').innerHTML = `
        <div class="tabs">
          <button class="tab active" data-tab="story">The story</button>
          <button class="tab" data-tab="team">Team</button>
          <button class="tab" data-tab="trust">Verification (${(s.documents||[]).length})</button>
          <button class="tab" data-tab="updates">Updates (${(s.updates||[]).length})</button>
        </div>

        <div class="tab-panel active" data-panel="story">
          <h3>🚨 The problem</h3>
          <p>${app.escapeHtml(s.problem).replace(/\n/g, '<br>')}</p>

          <h3>💡 The solution</h3>
          <p>${app.escapeHtml(s.solution).replace(/\n/g, '<br>')}</p>

          <h3>🛠️ The plan</h3>
          <p style="white-space: pre-line;">${app.escapeHtml(s.plan)}</p>

          <h3>📈 The market</h3>
          <p>${app.escapeHtml(s.market || 'Market details to be added by the founder.')}</p>
        </div>

        <div class="tab-panel" data-panel="team">
          <h3>Who's building this</h3>
          <p class="muted">The founders behind ${app.escapeHtml(s.name)} — verified identities and track records.</p>
          <div class="team-grid">${teamHTML}</div>
        </div>

        <div class="tab-panel" data-panel="trust">
          <h3>${s.verified ? '✅' : '⚠️'} Verification status</h3>
          ${s.verified
            ? '<p>This campaign has been reviewed and verified by the SaSpark trust team. Documents below have been checked.</p>'
            : '<p>This campaign is in early review. We recommend funding only after verification completes.</p>'}
          <div class="trust-grid">${docsHTML || '<p class="muted">No documents on file yet.</p>'}</div>
        </div>

        <div class="tab-panel" data-panel="updates">
          ${updatesHTML}
        </div>
      `;

      document.querySelectorAll('.tab').forEach((tab) => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach((t) => t.classList.remove('active'));
          document.querySelectorAll('.tab-panel').forEach((p) => p.classList.remove('active'));
          tab.classList.add('active');
          document.querySelector(`.tab-panel[data-panel="${tab.dataset.tab}"]`).classList.add('active');
        });
      });
    }

    function renderSidebar(s) {
      const progress = app.pct(s.amountRaised, s.fundingGoal);

      // Build funders list: seed contributions + locally recorded ones
      const seed = app.RECENT_CONTRIBUTIONS[s.id] || [];
      const local = (s.extraContribs || []).slice().reverse().map((c) => ({ funder: c.funder, amount: c.amount, msg: c.msg }));
      const combined = local.concat(seed).slice(0, 6);
      const fundersHTML = combined.length
        ? combined.map((c) => `
            <li class="funder-item">
              <div class="funder-avatar">${(c.funder || 'A').slice(0, 1).toUpperCase()}</div>
              <div class="funder-info">
                <div class="funder-name">${app.escapeHtml(c.funder || 'Anonymous')}</div>
                ${c.msg ? `<div class="funder-msg">${app.escapeHtml(c.msg)}</div>` : ''}
              </div>
              <div class="funder-amount">${app.fmtZARExact(c.amount)}</div>
            </li>
          `).join('')
        : '<li style="color: var(--slate-500); font-size: 0.9rem; text-align: center; padding: 12px 0;">Be the first to back this startup.</li>';

      document.getElementById('fund-sidebar').innerHTML = `
        <div class="fund-raised">${app.fmtZARExact(s.amountRaised)}</div>
        <div class="fund-goal-line">raised of ${app.fmtZARExact(s.fundingGoal)} goal</div>
        <div class="fund-bar-lg"><div class="fund-bar-fill" style="width: ${progress}%"></div></div>
        <div class="fund-stats">
          <div class="fund-stat"><div class="n">${app.fmtNum(s.fundersCount)}</div><div class="l">Backers</div></div>
          <div class="fund-stat"><div class="n">${s.daysLeft}</div><div class="l">Days left</div></div>
        </div>
        ${s.verified ? '<div class="verified-row">Trust team verified</div>' : ''}
        <button class="btn btn-fund btn-full btn-lg" id="fund-cta">Back this startup</button>
        <div style="text-align: center; font-size: 0.78rem; color: var(--slate-500); margin-top: 10px;">
          From R1 — pay by card, EFT, or QR code
        </div>
        <div style="margin-top: 24px;">
          <h4 style="margin-bottom: 8px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--slate-500);">Recent backers</h4>
          <ul class="funders-list">${fundersHTML}</ul>
        </div>
      `;
    }

    function bindFundModal(s) {
      const modal = document.getElementById('fund-modal');
      const close = document.getElementById('fund-close');
      const cta = document.getElementById('fund-cta');
      const amtInput = document.getElementById('fund-amount');
      const continueBtn = document.getElementById('fund-continue');
      const backBtn = document.getElementById('fund-back');
      const doneBtn = document.getElementById('fund-done');

      const stepAmt = document.getElementById('fund-step-amount');
      const stepPay = document.getElementById('fund-step-pay');
      const stepDone = document.getElementById('fund-step-success');

      function open() {
        stepAmt.style.display = 'block';
        stepPay.style.display = 'none';
        stepDone.style.display = 'none';
        modal.classList.add('open');
        setTimeout(() => amtInput.focus(), 200);
      }
      function shut() { modal.classList.remove('open'); }

      cta.addEventListener('click', open);
      close.addEventListener('click', shut);
      modal.addEventListener('click', (e) => { if (e.target === modal) shut(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') shut(); });

      document.querySelectorAll('.quick-amount').forEach((b) => {
        b.addEventListener('click', () => {
          amtInput.value = b.dataset.amt;
          document.querySelectorAll('.quick-amount').forEach((x) => x.classList.remove('active'));
          b.classList.add('active');
        });
      });

      continueBtn.addEventListener('click', () => {
        const amt = parseInt(amtInput.value, 10);
        if (!amt || amt < 1) { app.toast('Minimum funding is R1', 'error'); return; }
        const name = document.getElementById('fund-name').value.trim() || 'Anonymous';
        document.getElementById('fund-confirm-amt').textContent = app.fmtZARExact(amt);
        document.getElementById('fund-confirm-name').textContent = s.name;
        stepAmt.style.display = 'none';
        stepPay.style.display = 'block';
      });

      backBtn.addEventListener('click', () => {
        stepAmt.style.display = 'block';
        stepPay.style.display = 'none';
      });

      document.querySelectorAll('.pay-method').forEach((p) => {
        p.addEventListener('click', () => {
          const amt = parseInt(amtInput.value, 10);
          const name = document.getElementById('fund-name').value.trim() || 'Anonymous';
          const msg = document.getElementById('fund-msg').value.trim();

          // ─── PAYMENT INTEGRATION POINT ─────────────────────
          // In production, this would route through PayFast / Yoco /
          // Peach Payments / SnapScan APIs based on `p.dataset.pay`.
          // The trust account release would happen on milestone proof.
          // ────────────────────────────────────────────────────
          app.recordContribution(s.id, amt, name, msg);

          document.getElementById('success-amt').textContent = app.fmtZARExact(amt);
          stepPay.style.display = 'none';
          stepDone.style.display = 'block';
        });
      });

      doneBtn.addEventListener('click', () => {
        shut();
        const fresh = app.getStartupById(s.id);
        renderSidebar(fresh);
        bindFundModal(fresh);
        app.toast('Thank you for backing ' + fresh.name + '!', 'success');
      });
    }
  </script>
</body>
</html>
